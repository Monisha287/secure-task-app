<!DOCTYPE html>
<html>
<head>
  <title>Task Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>TaskApp</h2>

    <ul>
      <li onclick="showAll()">📋 All Tasks</li>
      <li onclick="showCompleted()">✅ Completed</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <h1>Dashboard</h1>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <h3>Total</h3>
        <p id="total">0</p>
      </div>

      <div class="stat-card">
        <h3>Completed</h3>
        <p id="done">0</p>
      </div>

      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pending">0</p>
      </div>
    </div>

    <!-- ADD TASK -->
    <div class="add-task">
      <input id="taskInput" placeholder="Enter your task...">
      <button onclick="addTask()">Add</button>
    </div>

    <!-- TASK LIST -->
    <div id="taskList" class="task-list"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
